<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wholesaler Dashboard</title>
    <link rel="stylesheet" href="wholesaler.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo-box">
          <h2><a href="wholesaler.html">Dashboard</a></h2>
        </div>

        <ul class="menu">
          <li>
            <a href="incoming.html" target="content-frame" >📥 Incoming Orders</a>
          </li>
          <li>
            <a href="pending.html" target="content-frame" >⏳ Pending Orders</a>
          </li>
          <li>
            <a href="completed.html" target="content-frame" >✅ Completed Orders</a>
          </li>
          <li><a href="chat-w.html" target="content-frame" >💬 Chat</a></li>
          <li><a href="settings.html" target="content-frame">⚙ Settings</a></li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="topbar">
          <div class="search-box">
            🔍
            <input type="text" placeholder="Search for orders" />
          </div>

          <div class="profile" onclick="openProfile()"></div>
        </div>
<div class="content-wrapper">

  <iframe id="mainFrame" name="content-frame" src="stats.html"></iframe>

</div>
      </div>
    </div>

    <script>
      function loadPage(page) {
        document.getElementById("mainFrame").src = page;
      }

      function openProfile() {
        document.getElementById("mainFrame").src = "profile.html";
      }

      // Show user initial in top-right circle
      window.onload = function () {
        const user = JSON.parse(localStorage.getItem("grocifyUser"));
        if (user) {
          const circle = document.querySelector(".profile");
          if (circle) {
            circle.innerText = user.name.charAt(0).toUpperCase();
          }
        }
      };
    </script>
  </body>
</html>
