<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="wholesaler.css">
</head>
<body style="background:transparent; padding:20px;">
<div class="dashboard-container">

  <!-- Stats Cards -->
  <div class="stats-section">

    <div class="stat-card">
      <div class="stat-icon">📥</div>
      <div>
        <h3 id="incomingCount">0</h3>
        <p>Incoming Orders</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">⏳</div>
      <div>
        <h3 id="pendingCount">0</h3>
        <p>Pending Orders</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div>
        <h3 id="completedCount">0</h3>
        <p>Completed Orders</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div>
        <h3 id="totalRevenue">₹ 0</h3>
        <p>Total Revenue</p>
      </div>
    </div>

  </div>

  <!-- Middle Section -->
  <div class="middle-section">

    <!-- Orders Chart -->
    <div class="chart-box">
      <h3>Orders This Week</h3>
      <canvas id="ordersChart"></canvas>
    </div>

    <!-- Recent Orders -->
    <div class="recent-box">
      <h3>Recent Orders</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Shop</th>
            <th>Status</th>
            <th>₹</th>
          </tr>
        </thead>
        <tbody id="recentOrdersTable"></tbody>
      </table>
    </div>

  </div>

  <!-- Bottom Section -->
  <div class="bottom-section">

    <!-- Revenue Summary -->
    <div class="summary-box">
      <h3>Revenue Summary</h3>
      <p>This Month: <strong id="thisMonth">₹ 0</strong></p>
      <p>Last Month: <strong id="lastMonth">₹ 0</strong></p>
      <p>Growth: <strong id="growthPercent">0%</strong></p>
    </div>

    <!-- Notifications -->
    <div class="notification-box">
      <h3>Notifications</h3>
      <ul id="notificationsList"></ul>
    </div>

  </div>

</div>
