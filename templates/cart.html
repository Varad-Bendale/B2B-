<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="{{ url_for('static', filename='cart.css') }}">
</head>
<body>

<div class="dashboard">

  <div class="main-content">


    <div class="content-wrapper">
      <h2>Shopping Cart</h2>

      <div class="cart-container">

        <div class="cart-items">

          {% if cart %}
            {% for item in cart %}
            <div class="cart-item">

              <img src="{{ url_for('static', filename=item.image) }}" alt="{{ item.name }}">

              <div class="item-details">
                <h4>{{ item.name }}</h4>
                <p class="price">₹{{ item.price }}</p>
              </div>

              <div class="quantity">

                <!-- − button → decrease qty in CSV -->
                <form action="{{ url_for('update') }}" method="POST" style="display:inline">
                  <input type="hidden" name="item_id"  value="{{ item.id }}">
                  <input type="hidden" name="action"   value="decrease">
                  <input type="hidden" name="back"     value="view_cart">
                  <input type="hidden" name="category" value="grocery">
                  <button type="submit">-</button>
                </form>

                <input type="text" value="{{ item.qty }}" readonly>

                <!-- + button → increase qty in CSV -->
                <form action="{{ url_for('update') }}" method="POST" style="display:inline">
                  <input type="hidden" name="item_id"  value="{{ item.id }}">
                  <input type="hidden" name="action"   value="increase">
                  <input type="hidden" name="back"     value="view_cart">
                  <input type="hidden" name="category" value="grocery">
                  <button type="submit">+</button>
                </form>

              </div>

              <!-- subtotal calculated in Python -->
              <div class="subtotal">₹{{ item.price * item.qty }}</div>

              <!-- ✕ → remove row from CSV entirely -->
              <form action="{{ url_for('remove') }}" method="POST" style="display:inline">
                <input type="hidden" name="item_id" value="{{ item.id }}">
                <button class="remove-btn" type="submit">✕</button>
              </form>

            </div>
            {% endfor %}

          {% else %}
            <p style="padding:20px; color:#888;">
              Cart is empty. <a href="{{ url_for('category', name='grocery') }}">Go shop →</a>
            </p>
          {% endif %}

        </div>

        <!-- All values passed from Python, no JS needed -->
        <div class="cart-summary">
          <h3>Order Summary</h3>

          <div class="summary-row">
            <span>Subtotal</span>
            <span>₹{{ subtotal }}</span>
          </div>

          <div class="summary-row">
            <span>Tax (5%)</span>
            <span>₹{{ tax }}</span>
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span>₹{{ total }}</span>
          </div>

          <button class="checkout-btn">Proceed to Checkout</button>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
</html>
