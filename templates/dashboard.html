<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shopkeeper Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard">
<div class="sidebar">
<div class="logo-box">
<h2>Grocify</h2>
</div>
<ul class="menu">
<li class="active"><a href="{{ url_for('shopkeeper_dashboard') }}">⊞ Products</a></li>
<li><a href="{{ url_for('shopkeeper_chat') }}">💬 Chat</a></li>
<li><a href="{{ url_for('view_cart') }}">🛒 Cart</a></li>
</ul>
</div>
<div class="main-content">
<div class="topbar">
<div class="search-box">
          🔍 <input type="text" placeholder="Search for products" />
</div>
<div class="top-icons">
<div class="profile"></div>
</div>
</div>
<div class="content-wrapper">
<div class="category-section">
<h2>Product Categories</h2>
<div class="category-grid">
<div class="category-card">
<img src="{{ url_for('static', filename='grocery.jpg') }}" alt="Grocery">
<h3>Grocery</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='grocery') }}" class="btn">View Items</a>
</div>
</div>
<div class="category-card">
<img src="{{ url_for('static', filename='beverages.png') }}" alt="Beverages">
<h3>Beverages</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='beverages') }}" class="btn">View Items</a>
</div>
</div>
<div class="category-card">
<img src="{{ url_for('static', filename='dairy.png') }}" alt="Dairy">
<h3>Dairy</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='dairy') }}" class="btn">View Items</a>
</div>
</div>
<div class="category-card">
<img src="{{ url_for('static', filename='vegetables.png') }}" alt="Vegetables">
<h3>Vegetables</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='vegetables') }}" class="btn">View Items</a>
</div>
</div>
<div class="category-card">
<img src="{{ url_for('static', filename='snacks.png') }}" alt="Snacks">
<h3>Snacks</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='snacks') }}" class="btn">View Items</a>
</div>
</div>
<div class="category-card">
<img src="{{ url_for('static', filename='cleaning.png') }}" alt="Cleaning">
<h3>Cleaning</h3>
<div class="btn-row">
<a href="{{ url_for('category', name='cleaning') }}" class="btn">View Items</a>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
